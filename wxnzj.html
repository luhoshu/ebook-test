<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消防人員安全與壓力管理</title>
  <style>
    :root {
      --bg: #f4efe6;
      --paper: #fffdf8;
      --ink: #24201c;
      --muted: #766a5b;
      --accent: #22395f;
      --accent-2: #b9872f;
      --border: rgba(90, 65, 35, 0.16);
      --shadow: rgba(55, 35, 16, 0.16);
      --font-size: 20px;
      --line-height: 1.85;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(34, 57, 95, 0.96);
      color: white;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .topbar-title {
      flex: 1;
      min-width: 0;
      font-weight: 900;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar button, .topbar select {
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      color: #17253f;
      min-height: 38px;
      padding: 0 12px;
      font-size: 15px;
      font-weight: 800;
    }
    .layout {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px 16px 90px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
    }
    .toc {
      position: sticky;
      top: 64px;
      align-self: start;
      max-height: calc(100vh - 88px);
      overflow: auto;
      background: rgba(255,253,248,.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 12px 34px var(--shadow);
    }
    .toc h2 { margin: 0 0 12px; font-size: 18px; color: var(--accent); }
    .toc button {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font-size: 15px;
      line-height: 1.35;
      cursor: pointer;
    }
    .toc button.active {
      background: #eef3fb;
      border-color: rgba(34,57,95,.18);
      color: var(--accent);
      font-weight: 900;
    }
    .cover {
      min-height: calc(100vh - 128px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 16px;
    }
    .cover:not(.active) { display: none; }
    .cover-card {
      width: min(720px, 100%);
      min-height: 760px;
      padding: 64px 48px;
      border-radius: 34px;
      background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,0)), linear-gradient(145deg, #143c79, #0b1d42);
      color: white;
      box-shadow: 0 28px 70px rgba(30,20,10,.26);
      border: 2px solid rgba(219,195,145,.48);
      text-align: center;
    }
    .cover-badge {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 999px;
      background: var(--accent-2);
      color: #132746;
      font-weight: 900;
      letter-spacing: .2em;
      margin-bottom: 120px;
    }
    .cover-title {
      font-size: clamp(36px, 7vw, 64px);
      line-height: 1.35;
      font-weight: 900;
      margin-bottom: 140px;
    }
    .cover-author { color: #f4e0b6; font-size: 24px; line-height: 1.6; }
    .chapter {
      display: none;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 16px 42px var(--shadow);
      padding: 36px;
    }
    .chapter.active { display: block; }
    .chapter-header {
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding-bottom: 20px;
    }
    .chapter-title {
      margin: 0;
      color: var(--accent);
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.3;
    }
    .audio-card {
      margin: 22px 0 28px;
      padding: 16px;
      border-radius: 18px;
      background: #f3ebdd;
      border: 1px solid var(--border);
    }
    .audio-card audio { width: 100%; height: 44px; display: block; }
    .chapter-body { font-size: var(--font-size); line-height: var(--line-height); }
    .chapter-body p { margin: 0 0 1.15em; }
    .chapter-body h2, .chapter-body h3, .chapter-body h4 {
      color: var(--accent);
      line-height: 1.35;
      margin: 1.5em 0 .65em;
    }
    .chapter-body ul { padding-left: 1.4em; margin: 0 0 1.2em; }
    .chapter-body li { margin: .35em 0; }
    .chapter-body code {
      padding: .1em .35em;
      border-radius: 6px;
      background: rgba(30,30,30,.08);
    }
    .chapter-body a {
      color: #0f5ca8;
      font-weight: 900;
      text-decoration: underline;
      word-break: break-all;
    }
    .chapter-body a:visited {
      color: #5f3c9a;
    }
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 40;
      width: min(720px, calc(100% - 24px));
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      padding: 10px;
      border-radius: 22px;
      background: rgba(255,253,248,.92);
      box-shadow: 0 12px 34px rgba(55,35,16,.2);
      backdrop-filter: blur(10px);
    }
    .bottom-nav button {
      min-height: 48px;
      border: 0;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-size: 17px;
      font-weight: 900;
    }
    .bottom-nav button:disabled { opacity: .35; }
    .page-indicator {
      min-width: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 900;
    }
    @media (max-width: 780px) {
      .topbar { gap: 6px; }
      .topbar-title { font-size: 16px; }
      .topbar button, .topbar select { min-height: 36px; padding: 0 10px; font-size: 14px; }
      .layout { display: block; padding: 12px 10px 88px; }
      .toc { display: none; }
      .cover { min-height: calc(100vh - 130px); padding: 18px 0; }
      .cover-card { min-height: 620px; padding: 46px 28px; border-radius: 26px; }
      .cover-badge { margin-bottom: 88px; }
      .cover-title { margin-bottom: 100px; }
      .chapter { padding: 24px 18px; border-radius: 20px; }
      .chapter-body { font-size: calc(var(--font-size) - 1px); }
      .bottom-nav { bottom: 8px; }
      .bottom-nav button { min-height: 54px; font-size: 18px; }
    }
  </style>
</head>

  <header class="topbar">

    <aside class="toc" id="toc"><h2>目錄</h2></aside>

      <section class="cover active" id="cover">

  <nav class="bottom-nav">

  </nav>
  <script>
    const chapters = [{"number": 1, "key": "1", "title": "安全執勤 平安歸隊", "sourceTextName": "01.txt", "sourceAudioName": "01.mp3", "html": "<p>各位消防夥伴大家好，歡迎收聽《安全執勤・平安歸隊》消防人員安全與壓力管理數位教材。 消防工作充滿挑戰，每一次出勤，都可能面對高溫、濃煙、危險環境與高度壓力。安全執勤，不只是裝備完整，也不只是技術熟練，更包含身心狀態的穩定、壓力的覺察，以及團隊之間的互相支持。 這份教材將帶領大家從入室前安全檢查開始，認識火場管制、創傷壓力、壓力因應、求助時機，以及身心狀態對安全的影響。 安全不是口號，而是行動。準備每一步，保護每一位。讓我們一起學習如何照顧自己、守護同袍，做到安全執勤，平安歸隊。</p>", "audio": "audio/01.mp3", "audioMediaType": "audio/mpeg"}, {"number": 2, "key": "2", "title": "目錄", "sourceTextName": "02.txt", "sourceAudioName": "02.mp3", "html": "<p>本教材共分為四個主要章節。 第一章是「入室前安全檢核」，我們會學習入室前安全的重要性、常見錯誤與潛在風險、安全檢查流程，以及火場進入管制點。 第二章是「創傷壓力與因應」，內容包含什麼是創傷壓力、壓力反應、壓力對安全的影響、壓力因應策略，以及何時需要尋求協助。 第三章是「身心狀態與安全表現」，我們會理解身心狀態如何影響判斷、反應、團隊合作與整體安全。 第四章是「最終提醒」，透過重點整理與行動提醒，協助大家把學到的觀念落實在每一次勤務中。 學習這份教材時，請依照章節順序閱讀，也可以搭配團隊討論，把教材中的觀念轉化為現場可以實際運用的行動。</p>", "audio": "audio/02.mp3", "audioMediaType": "audio/mpeg"}, {"number": 3, "key": "3", "title": "影片導入：", "sourceTextName": "03.txt", "sourceAudioName": "03.mp3", "html": "<p>接下來，請先觀看一段關於入室前安全檢查的短影片。 入室前的一次確認，可能改變整個任務的安全結果。 裝備是否完整？ 環境是否穩定？ 隊友是否到位？ 任務是否清楚？ 這些看似簡單的檢查，都是保護自己與同袍的重要防線。 請先點選影片連結觀看。看完影片後，再進入第一章，一起學習入室前安全檢查的重要性與執行重點。 請記得，入室前多一秒確認，任務中就多一分安全。</p>\n<p>《差一秒，差很多：消防人員入室前安全檢查》 <a href=\"https://youtube.com/shorts/ZxC_pHLWUM4?feature=share\" target=\"_blank\" rel=\"noopener noreferrer\">https://youtube.com/shorts/ZxC_pHLWUM4?feature=share</a></p>", "audio": "audio/03.mp3", "audioMediaType": "audio/mpeg"}, {"number": 4, "key": "4", "title": "前言", "sourceTextName": "04.txt", "sourceAudioName": "04.mp3", "html": "<p>消防勤務具有高度風險與不確定性。消防人員在每一次出勤中，都可能面對火場、濃煙、高溫、危險建築、受困民眾，甚至同袍受傷等突發狀況。 除了裝備與技術之外，正確的安全意識、完整的作業流程，以及良好的身心狀態，都是確保任務成功、平安返隊不可或缺的關鍵。 本教材將從入室前安全檢查與火場進入管制開始，逐步帶領大家認識創傷壓力反應、壓力因應與求助時機，並理解身心狀態如何影響現場判斷與安全表現。 期望透過本教材的學習，讓每一位消防夥伴都能在每一次出勤前做好準備，在執勤中保持專注與團隊合作，在任務結束後也能照顧自己，落實「安全執勤，平安歸隊」的核心目標。</p>", "audio": "audio/04.mp3", "audioMediaType": "audio/mpeg"}, {"number": 5, "key": "5", "title": "入室前安全的重要性", "sourceTextName": "05.txt", "sourceAudioName": "05.mp3", "html": "<p>第一章，我們從「入室前安全」開始。 進入火場前的每一個確認，都是保護自己與夥伴的重要關鍵。火場環境瞬息萬變，任何一個疏忽，都可能造成嚴重後果。 入室前安全檢查的目的，不只是確認裝備有沒有帶齊，更是要降低風險、提升任務成功率、確保團隊安全，並守護每一位消防人員的生命健康。 在進入火場前，我們需要確認環境、裝備、人員、任務與撤離條件。只有準備充分，才能讓現場行動更穩定，也讓團隊彼此更安心。 請記得，安全不是習慣以外的事情，而是每一次任務都必須落實的基本動作。平安回家，是每一次出勤最重要的目標。</p>", "audio": "audio/05.mp3", "audioMediaType": "audio/mpeg"}, {"number": 6, "key": "6", "title": "常見錯誤與潛在風險", "sourceTextName": "06.txt", "sourceAudioName": "06.mp3", "html": "<p>在火場中，一個小小的疏忽，都可能引發嚴重後果。 常見錯誤包括：沒有執行入室前安全檢查、裝備檢查不確實、缺乏資訊溝通與確認、沒有建立入室管制、低估火場風險與環境變化，以及忽略自身身心狀態。 這些錯誤可能導致判斷失準、救援延誤、通訊不良、迷航受困、暴露於高溫或有毒氣體中，甚至增加人員傷亡風險。 錯誤可以被避免，風險可以被管理。重點在於：進入前要謹慎檢查，行動中要落實管制，發現異常要立即回報。 安全來自習慣，習慣源自每一次的檢查與確認。當我們願意多確認一步，就能少一分危險。</p>", "audio": "audio/06.mp3", "audioMediaType": "audio/mpeg"}, {"number": 7, "key": "7", "title": "入室前安全檢查流程", "sourceTextName": "07.txt", "sourceAudioName": "07.mp3", "html": "<p>入室前安全檢查，可以用五個步驟來掌握。 第一，掌握資訊。包含起火原因、建築結構、人員受困狀況，以及特殊危害。 第二，環境評估。觀察火勢、煙流、出入動線與周邊環境，確認現場是否有快速變化。 第三，裝備檢查。確認個人防護裝備完整，空氣量充足，通訊設備正常，工具器材齊備。 第四，團隊確認。確認任務分工、進入順序、通訊頻道與撤離點。 第五，管制與記錄。完成管制登記，記錄進入時間、人員狀況與空氣消耗。 每一個步驟都不能省略，因為疏忽可能付出生命代價。檢查到位，安全加倍；檢查不確實，危險就難以預測。</p>", "audio": "audio/07.mp3", "audioMediaType": "audio/mpeg"}, {"number": 8, "key": "8", "title": "影片導入：", "sourceTextName": "08.txt", "sourceAudioName": "08.mp3", "html": "<p>接下來，請先觀看一段關於消防人員創傷壓力辨識與因應的短影片。 消防工作不只考驗體力與技術，也會承受高壓、疲勞與情緒衝擊。 壓力反應不是軟弱，而是身體與心理正在提醒我們需要調整。 當我們能夠辨識自己的狀態，願意說出來、尋求支持，就是在保護自己，也是在守護團隊安全。 請先點選影片連結觀看。看完影片後，再進入第二章，一起學習創傷壓力的辨識、影響、因應與求助方式。 請記得，不要獨自承受。說出來，不是軟弱；尋求支持，是安全行動。</p>\n<p>《不要獨自承受：消防人員創傷壓力辨識與因應》 <a href=\"https://youtube.com/shorts/KVxpHG7rnjo?feature=share\" target=\"_blank\" rel=\"noopener noreferrer\">https://youtube.com/shorts/KVxpHG7rnjo?feature=share</a></p>", "audio": "audio/08.mp3", "audioMediaType": "audio/mpeg"}, {"number": 9, "key": "9", "title": "火場進入管制點", "sourceTextName": "09.txt", "sourceAudioName": "09.mp3", "html": "<p>火場進入管制點，是安全管理的第一道防線。 設置管制點的目的，是掌握人員位置、管控進出時間，並確保發生危險時，可以快速確認人員狀況與撤離需求。 進入管制點時，必須落實三個核心重點：進入前登記、任務明確、持續回報。 進入前登記，可以讓現場知道誰進入、何時進入、執行什麼任務。任務明確，可以避免人員在火場中方向不清或行動混亂。持續回報，則能讓指揮與管制人員即時掌握狀況。 火場不是只靠個人勇氣，而是靠制度、紀律與團隊合作。制度到位，安全才有保障。</p>", "audio": "audio/09.mp3", "audioMediaType": "audio/mpeg"}, {"number": 10, "key": "10", "title": "什麼是創傷壓力", "sourceTextName": "10.txt", "sourceAudioName": "10.mp3", "html": "<p>第二章，我們進入創傷壓力的主題。 創傷壓力，是人在高壓、危險或突發事件中，身體與心理產生的自然反應。對消防人員來說，火場救援、重大災害、人員傷亡、長時間高壓任務，都可能成為創傷壓力的來源。 當壓力出現時，可能會有緊張、恐懼、心跳加快、呼吸急促等反應。這些反應並不代表軟弱，也不是能力不足，而是身體和大腦正在啟動保護機制。 理解壓力，是控制壓力的第一步。只有認識自己的反應，才能進一步調整狀態，避免壓力影響判斷與行動。 請記得，出現壓力反應是正常的；重要的是，我們要學會辨識它、面對它，並在需要時尋求支持。</p>", "audio": "audio/10.mp3", "audioMediaType": "audio/mpeg"}, {"number": 11, "key": "11", "title": "壓力反應", "sourceTextName": "11.txt", "sourceAudioName": "11.mp3", "html": "<p>當我們面對危險或高壓情境時，身體與心理會出現不同反應。 壓力反應大致可以分成三個面向。 第一是生理反應，例如心跳加快、呼吸急促、出汗、肌肉緊繃、腸胃不適。這表示身體進入警戒狀態，準備面對危險。 第二是心理反應，例如焦慮、害怕、注意力下降、想法混亂、記憶力變差。這些反應可能影響思考與判斷。 第三是行為反應，例如動作僵硬、反應遲緩、情緒爆發、退縮或逃避。當行為受到壓力影響時，任務執行就可能變得不穩定。 壓力反應本身不是錯，也不是失敗。真正重要的是認識自己的反應，知道什麼時候需要調整，什麼時候需要協助。</p>", "audio": "audio/11.mp3", "audioMediaType": "audio/mpeg"}, {"number": 12, "key": "12", "title": "壓力對安全的影響", "sourceTextName": "12.txt", "sourceAudioName": "12.mp3", "html": "<p>壓力如果過大，或持續存在，就會影響我們的判斷、行動與團隊合作。 第一，壓力會影響判斷力。注意力下降、思考變慢、判斷錯誤，都可能讓我們忽略重要訊息，做出錯誤決定。 第二，壓力會影響行動力。反應變慢、動作不協調、體力消耗更快，可能讓人錯失最佳行動時機。 第三，壓力會影響團隊合作。情緒不穩、溝通不良、容易衝突，會讓團隊默契下降，任務執行更困難。 壓力不一定會消失，但可以被管理。當我們能覺察壓力、調整身心狀態，就能降低風險，提升安全表現。 認識壓力的影響，不是要讓我們害怕壓力，而是要讓我們更有能力保護自己與團隊。</p>", "audio": "audio/12.mp3", "audioMediaType": "audio/mpeg"}, {"number": 13, "key": "13", "title": "壓力因應策略", "sourceTextName": "13.txt", "sourceAudioName": "13.mp3", "html": "<p>面對壓力，我們可以學習有效的因應策略。 第一，覺察自己的狀態。留意身體反應、情緒變化與壓力來源，這是改變的第一步。 第二，調整身體狀態。透過深呼吸、放鬆、伸展、休息與充足睡眠，讓身體慢慢回到穩定狀態。 第三，調整思考方式。把注意力放在可控制的事情上，避免災難化想法，並用正向語言鼓勵自己。 第四，尋求支持與傾訴。與同袍、家人或信任的人分享感受，必要時尋求專業協助。 第五，建立應對習慣。壓力管理不是一次性的動作，而是持續練習的過程。 管理壓力，不是要求自己完全沒有壓力，而是讓自己在壓力中仍能保持穩定，做出安全行動。</p>", "audio": "audio/13.mp3", "audioMediaType": "audio/mpeg"}, {"number": 14, "key": "14", "title": "何時需要求助？", "sourceTextName": "14.txt", "sourceAudioName": "14.mp3", "html": "<p>求助不是軟弱，而是保護自己與團隊的勇敢行動。 當出現以下狀況時，就要提高警覺，並主動尋求協助。 例如：情緒持續低落或焦慮、睡眠或食慾明顯改變、身體不適持續存在、工作或日常生活受到影響、出現危險想法或行為，或是感覺自己已經無法獨自面對。 可以尋求的對象包括同袍、幹部主管、醫護人員、心理師、心理諮詢專線，以及家人朋友。 及早求助，可以避免狀況惡化；專業協助，也能幫助我們更快恢復。 請記得，你不需要一個人承擔。勇敢求助，是讓自己與隊友更安全的重要選擇。</p>", "audio": "audio/14.mp3", "audioMediaType": "audio/mpeg"}, {"number": 15, "key": "15", "title": "身心狀態影響安全", "sourceTextName": "15.txt", "sourceAudioName": "15.mp3", "html": "<p>第三章，我們要理解身心狀態如何影響安全。 當身心狀態不佳時，判斷、反應、體能、情緒與安全意識都可能受到影響。 例如，注意力下降，可能造成判斷錯誤；反應變慢，可能錯過危險訊號；情緒不穩，可能影響溝通與團隊合作；體能不足，可能增加任務失敗或受傷的風險。 相反地，良好的身心狀態，可以幫助我們保持專注、正確判斷、快速反應，並與隊友維持良好合作。 因此，睡眠、壓力調整、專注力、團隊互相提醒，都是安全的一部分。 狀態到位，安全才會到位。照顧好自己的身心狀態，就是在守護自己與團隊的安全。</p>", "audio": "audio/15.mp3", "audioMediaType": "audio/mpeg"}, {"number": 16, "key": "16", "title": "安全與身心的整合觀念", "sourceTextName": "16.txt", "sourceAudioName": "16.mp3", "html": "<p>安全不只是設備與規則，更是身心狀態、團隊合作與持續警覺的整合。 從第一章到第三章，我們可以看到一個完整的安全概念。 安全檢查，讓我們在任務開始前降低風險。壓力辨識，讓我們知道自己正在受到什麼影響。身心狀態管理，則幫助我們保持判斷力、行動力與團隊合作能力。 有三個關鍵要記得：狀態會影響判斷，壓力會影響行動，情緒會影響團隊。 因此，安全不是只有裝備齊全，更是每個人都能保持覺察、主動調整、互相提醒。 當身心到位，安全才會到位。安全文化，就是從每一位消防夥伴的自我覺察與彼此支持開始。</p>", "audio": "audio/16.mp3", "audioMediaType": "audio/mpeg"}, {"number": 17, "key": "17", "title": "最終提醒", "sourceTextName": "17.txt", "sourceAudioName": "17.mp3", "html": "<p>第四章，我們進入最後提醒。 安全沒有捷徑，只有每一個細節都做到位。出勤前、中、後，都要時刻提醒自己與團隊。 每一次出勤，都要確認四件事：裝備確認、狀態確認、任務確認、團隊確認。 當你發現自己疲勞、壓力過大、注意力下降時，請不要硬撐。可以先放慢，調整呼吸與狀態，並把狀況說出來，必要時尋求協助。 互相提醒不是麻煩，而是保護彼此。真正可靠的消防人員，不只是勇敢，更是能夠看見風險、願意溝通、懂得照顧自己與團隊。 每個細節，都是安全關鍵。把安全做到位，就是讓每一次任務多一分保障。</p>", "audio": "audio/17.mp3", "audioMediaType": "audio/mpeg"}, {"number": 18, "key": "18", "title": "結尾", "sourceTextName": "18.txt", "sourceAudioName": "18.mp3", "html": "<p>來到最後，我們一起回顧這段學習旅程。 這份教材從裝備檢查與入室管制開始，帶大家認識創傷壓力與壓力反應，也學習如何因應壓力、何時尋求協助，最後理解身心狀態與安全表現之間的關係。 今天我們學到的重點包括：裝備檢查與管制、創傷壓力認識、壓力因應與求助、身心狀態影響安全。 我們也提醒自己，安全優先、風險意識、身心管理、互相支持、清楚溝通，都是任務成功與平安歸隊的重要基礎。 照顧自己，才能保護別人。良好狀態，才能安全執勤。希望每一位消防夥伴，都能把今天學到的觀念帶回日常訓練與每一次出勤中。 讓我們一起守護彼此，完成每一次任務，平安出勤，平安歸隊。</p>", "audio": "audio/18.mp3", "audioMediaType": "audio/mpeg"}, {"number": 19, "key": "19", "title": "照顧自己 守護團隊", "sourceTextName": "19.txt", "sourceAudioName": "19.mp3", "html": "<p>最後，請把這句話留在心裡： 照顧自己，守護團隊。 消防工作不只是面對火場與災害，更是在每一次任務中，承擔對生命的責任。你保護民眾，也要記得保護自己；你支援同袍，也值得被同袍支持。 安全不是一個人的事，而是整個團隊共同守護的價值。 願每一次出勤，都能準備充分；願每一次任務，都能彼此照應；願每一位消防夥伴，都能平安出勤，平安歸隊。 謝謝你的學習，也謝謝每一位消防人員的付出。本教材到此結束，願每一次出勤，都能安全執勤，平安歸隊。</p>", "audio": "audio/19.mp3", "audioMediaType": "audio/mpeg"}];
    const book = document.getElementById("book");
    const toc = document.getElementById("toc");
    const chapterSelect = document.getElementById("chapterSelect");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageIndicator = document.getElementById("pageIndicator");
    const fontMinus = document.getElementById("fontMinus");
    const fontPlus = document.getElementById("fontPlus");
    let currentIndex = -1;
    let fontSize = 20;

    function stopAllAudio() {
      document.querySelectorAll("audio").forEach(audio => audio.pause());
    }
    function escapeHtml(value) {
      return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function buildBook() {
      chapters.forEach((chapter, index) => {
        const article = document.createElement("article");
        article.className = "chapter";
        article.id = "chapter-" + index;
        const audioHtml = chapter.audio
          ? `<div class="audio-card"><audio controls preload="none"><source src="${chapter.audio}" type="${chapter.audioMediaType || "audio/mpeg"}">您的瀏覽器不支援音訊播放。</audio></div>`
          : "";
        article.innerHTML = `
          <header class="chapter-header">
            <h1 class="chapter-title">${escapeHtml(chapter.title)}</h1>
          </header>
          ${audioHtml}
          <div class="chapter-body">${chapter.html}</div>
        `;
        book.appendChild(article);

        const tocButton = document.createElement("button");
        tocButton.type = "button";
        tocButton.textContent = `${index + 1}. ${chapter.title}`;
        tocButton.addEventListener("click", () => showChapter(index));
        toc.appendChild(tocButton);

        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = `${index + 1}. ${chapter.title}`;
        chapterSelect.appendChild(option);
      });

      const coverOption = document.createElement("option");
      coverOption.value = "-1";
      coverOption.textContent = "封面";
      chapterSelect.insertBefore(coverOption, chapterSelect.firstChild);
      chapterSelect.value = "-1";
    }
    function showChapter(index) {
      stopAllAudio();
      currentIndex = index;
      document.querySelectorAll(".cover, .chapter").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".toc button").forEach((button, i) => button.classList.toggle("active", i === index));
      if (index < 0) {
        document.getElementById("cover").classList.add("active");
        pageIndicator.textContent = "封面";
        chapterSelect.value = "-1";
      } else {
        document.getElementById("chapter-" + index).classList.add("active");
        pageIndicator.textContent = `${index + 1} / ${chapters.length}`;
        chapterSelect.value = String(index);
      }
      prevBtn.disabled = index <= -1;
      nextBtn.disabled = index >= chapters.length - 1;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    prevBtn.addEventListener("click", () => { if (currentIndex > -1) showChapter(currentIndex - 1); });
    nextBtn.addEventListener("click", () => { if (currentIndex < chapters.length - 1) showChapter(currentIndex + 1); });
    chapterSelect.addEventListener("change", () => showChapter(Number(chapterSelect.value)));
    fontMinus.addEventListener("click", () => {
      fontSize = Math.max(16, fontSize - 2);
      document.documentElement.style.setProperty("--font-size", fontSize + "px");
    });
    fontPlus.addEventListener("click", () => {
      fontSize = Math.min(32, fontSize + 2);
      document.documentElement.style.setProperty("--font-size", fontSize + "px");
    });
    document.addEventListener("keydown", event => {
      if (event.key === "ArrowRight") nextBtn.click();
      if (event.key === "ArrowLeft") prevBtn.click();
    });
    buildBook();
    showChapter(-1);
  </script>
</body>
</html>
